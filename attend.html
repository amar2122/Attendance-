<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Mark Karein</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh; color: #e2e8f0; padding: 20px;
  }
  .card {
    max-width: 420px; margin: 0 auto;
    background: #1e293b; border-radius: 20px;
    padding: 28px 22px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(56,217,169,0.2);
  }
  .logo { font-size: 2rem; text-align: center; margin-bottom: 6px; }
  h1 { font-size: 1.2rem; font-weight: 800; color: #38d9a9; text-align: center; }
  .subtitle { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 24px; margin-top: 4px; }
  .field { margin-bottom: 18px; }
  label { font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
  select, input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    background: #0f172a; border: 1px solid rgba(56,217,169,0.3);
    color: #e2e8f0; font-size: 1rem; outline: none;
    font-family: 'Segoe UI', sans-serif;
  }
  select:focus, input:focus { border-color: #38d9a9; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 1rem; font-weight: 800; cursor: pointer;
    font-family: 'Segoe UI', sans-serif; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #38d9a9, #0ea5e9);
    color: #0f172a; margin-top: 8px;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .success {
    display: none; text-align: center; padding: 30px 20px;
  }
  .success-icon { font-size: 4rem; margin-bottom: 12px; }
  .success h2 { color: #38d9a9; font-size: 1.4rem; margin-bottom: 8px; }
  .success p { color: #94a3b8; font-size: 0.9rem; }
  .error-msg { color: #ff6b6b; font-size: 0.82rem; margin-top: 8px; display: none; }
  .info-bar {
    background: rgba(56,217,169,0.1); border: 1px solid rgba(56,217,169,0.2);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
    font-size: 0.78rem; color: #94a3b8;
  }
  .info-bar span { color: #38d9a9; font-weight: 700; }
  .timer { text-align: center; font-size: 0.85rem; color: #94a3b8; margin-bottom: 16px; }
  .timer span { color: #f59e0b; font-weight: 700; }
</style>
</head>
<body>
<div class="card" id="formCard">
  <div class="logo">🏫</div>
  <h1>Attendance Mark Karein</h1>
  <div class="subtitle" id="pageSubtitle">Loading...</div>

  <div class="info-bar" id="infoBar" style="display:none">
    Register: <span id="infoReg">—</span> &nbsp;·&nbsp; Date: <span id="infoDate">—</span>
  </div>

  <div class="timer" id="timerDiv" style="display:none">
    Session time baaki: <span id="timerVal">—</span>
  </div>

  <div id="mainForm">
    <div class="field">
      <label>Apna Naam Select Karein</label>
      <select id="studentSelect">
        <option value="">— Select Karein —</option>
      </select>
    </div>

    <div class="field">
      <label>Apna Roll Number Confirm Karein</label>
      <input type="text" id="rollInput" placeholder="e.g. 5" readonly/>
    </div>

    <div class="error-msg" id="errorMsg">❌ Pehle apna naam select karein!</div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitAttendance()">
      ✅ Present Mark Karein
    </button>
  </div>

  <div class="success" id="successDiv">
    <div class="success-icon">🎉</div>
    <h2>Attendance Mark Ho Gayi!</h2>
    <p id="successMsg">Aapki attendance successfully register ho gayi hai.</p>
  </div>
</div>

<script>
const FIREBASE_DB_URL = "https://student-attendance-6d56b-default-rtdb.firebaseio.com";

let sessionId = null;
let dayIndex = null;
let regIndex = null;
let students = [];
let sessionExpiry = null;

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function init() {
  sessionId = getParam('s');
  dayIndex   = parseInt(getParam('d') || '0');
  regIndex   = parseInt(getParam('r') || '0');

  const stParam = getParam('st');

  if (!sessionId) {
    document.getElementById('pageSubtitle').textContent = '❌ Invalid link!';
    return;
  }

  // Load session from Firebase to get student list and expiry
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/sessions/${sessionId}.json`);
    const session = await res.json();

    if (!session) {
      document.getElementById('pageSubtitle').textContent = '❌ Session expired ya invalid hai!';
      return;
    }

    sessionExpiry = session.expires;

    // Check if expired
    if (Date.now() > sessionExpiry) {
      document.getElementById('pageSubtitle').textContent = '⏱ Session expire ho gaya! Teacher se dobara QR maango.';
      return;
    }

    // Build student list from session
    students = Object.entries(session.students || {}).map(([rn, name]) => ({ rn: parseInt(rn), name }));
    students.sort((a, b) => a.rn - b.rn);

    // Fill UI
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const date = new Date();
    const dayNum = dayIndex + 1;
    document.getElementById('pageSubtitle').textContent = 'Government Degree College, Nandasain';
    document.getElementById('infoBar').style.display = 'block';
    document.getElementById('infoReg').textContent = `Register ${regIndex + 1}`;
    document.getElementById('infoDate').textContent = `${dayNum} ${months[date.getMonth()]} ${date.getFullYear()}`;

    // Fill dropdown
    const sel = document.getElementById('studentSelect');
    students.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.rn;
      opt.textContent = `${s.rn + 1}. ${s.name}`;
      sel.appendChild(opt);
    });

    sel.addEventListener('change', () => {
      const rn = parseInt(sel.value);
      if (!isNaN(rn)) {
        document.getElementById('rollInput').value = rn + 1;
      } else {
        document.getElementById('rollInput').value = '';
      }
    });

    // Start timer
    document.getElementById('timerDiv').style.display = 'block';
    startTimer();

  } catch(e) {
    document.getElementById('pageSubtitle').textContent = '❌ Error: Internet check karein.';
  }
}

function startTimer() {
  setInterval(() => {
    const remaining = sessionExpiry - Date.now();
    if (remaining <= 0) {
      document.getElementById('timerVal').textContent = 'Expired!';
      document.getElementById('submitBtn').disabled = true;
      return;
    }
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    document.getElementById('timerVal').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  }, 1000);
}

async function submitAttendance() {
  const sel = document.getElementById('studentSelect');
  const rn = sel.value;
  const errorEl = document.getElementById('errorMsg');

  if (rn === '') {
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';

  if (Date.now() > sessionExpiry) {
    alert('Session expire ho gaya! Teacher se dobara QR scan karwao.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Submit ho raha hai...';

  try {
    // Write response to Firebase
    await fetch(`${FIREBASE_DB_URL}/sessions/${sessionId}/responses/${rn}.json`, {
      method: 'PUT',
      body: JSON.stringify('P')
    });

    // Show success
    document.getElementById('mainForm').style.display = 'none';
    const successDiv = document.getElementById('successDiv');
    successDiv.style.display = 'block';
    const studentName = students.find(s => s.rn === parseInt(rn))?.name || '';
    document.getElementById('successMsg').textContent = `${studentName} — Roll No. ${parseInt(rn)+1} — attendance register ho gayi! ✅`;

  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✅ Present Mark Karein';
    alert('❌ Error! Internet check karein aur dobara try karein.');
  }
}

init();
</script>
</body>
</html>
